# ==================================
# Development — Application Stack
# ==================================
# Dev overrides for the app services.
# Infrastructure (postgres, redis, minio) must be started first:
#   docker compose -f docker-compose.infra.yml up -d
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d --build
# ==================================

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: development
    container_name: orderium-api-dev
    command: npm run start:dev
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DB_HOST: postgres # infra postgres, same Docker network
      DB_PORT: 5432
      DB_SYNCHRONIZE: "false" # use migrations even in dev
      DB_LOGGING: "true"
      MASTER_DB_NAME: ${MASTER_DB_NAME:-orderium_master}
      SUPER_ADMIN_API_KEY: ${SUPER_ADMIN_API_KEY}
      CORS_ORIGIN: "http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:5173"
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
    volumes:
      - ./api/src:/app/src:ro
      - ./api/package.json:/app/package.json:ro
    ports:
      - "3000:3000"
    networks:
      - orderium-network
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})\"" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  backoffice:
    build:
      context: .
      dockerfile: backoffice/Dockerfile
      target: development
    container_name: orderium-backoffice-dev
    env_file:
      - ./backoffice/.env
    environment:
      NODE_ENV: development
      VITE_API_PROXY_TARGET: http://api:3000
    volumes:
      - ./backoffice/src:/app/src:ro
      - ./backoffice/public:/app/public:ro
    ports:
      - "3001:3001"
    networks:
      - orderium-network

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      target: development
    container_name: orderium-client-dev
    env_file:
      - ./client/.env
    environment:
      NODE_ENV: development
      VITE_API_PROXY_TARGET: http://api:3000
    volumes:
      - ./client/src:/app/src:ro
      - ./client/public:/app/public:ro
    ports:
      - "3002:3002"
    networks:
      - orderium-network

  delivery-portal:
    build:
      context: .
      dockerfile: delivery-portal/Dockerfile
      target: development
    container_name: orderium-delivery-dev
    env_file:
      - ./delivery-portal/.env
    environment:
      NODE_ENV: development
      VITE_API_PROXY_TARGET: http://api:3000
    volumes:
      - ./delivery-portal/src:/app/src:ro
      - ./delivery-portal/public:/app/public:ro
    ports:
      - "3003:3003"
    networks:
      - orderium-network

  tenant-dashboard:
    build:
      context: ./tenant-dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    container_name: orderium-tenant-dashboard-dev
    ports:
      - "4000:80"
    networks:
      - orderium-network

# ────────────────────────────────────────────────────────
# Network — must already exist (created by docker-compose.infra.yml)
# ────────────────────────────────────────────────────────
networks:
  orderium-network:
    external: true
    name: orderium-network
