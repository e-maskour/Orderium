# ==================================
# Production — Application Stack
# ==================================
# Infrastructure (postgres, redis, minio) must be started first:
#   docker compose -f docker-compose.infra.yml up -d
#
# Usage:
#   docker compose up -d --build
# ==================================
name: orderium

x-frontend-common: &frontend-common
  networks:
    - orderium-network
  restart: unless-stopped
  init: true

services:

  # ────────────────────────────────────────────────────────
  # NestJS API Backend
  # ────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: orderium-api
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_HOST: orderium-postgres
      DB_PORT: 5432
      DB_SYNCHRONIZE: "false"
      DB_LOGGING: "false"
      MASTER_DB_NAME: ${MASTER_DB_NAME:-orderium_master}
      SUPER_ADMIN_API_KEY: ${SUPER_ADMIN_API_KEY}
      REDIS_URL: redis://orderium-redis:6379
      MINIO_ENDPOINT: orderium-minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
    ports:
      - "3000:3000"
    networks:
      - orderium-network
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})\"" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ────────────────────────────────────────────────────────
  # Backoffice Frontend  (Admin)
  # ────────────────────────────────────────────────────────
  backoffice:
    <<: *frontend-common
    build:
      context: .
      dockerfile: backoffice/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
        VITE_MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}
        VITE_FIREBASE_VAPID_KEY: ${VITE_FIREBASE_VAPID_KEY}
    container_name: orderium-backoffice
    ports:
      - "3001:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ────────────────────────────────────────────────────────
  # Client Portal Frontend
  # ────────────────────────────────────────────────────────
  client:
    <<: *frontend-common
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
        VITE_MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}
        VITE_FIREBASE_VAPID_KEY: ${VITE_FIREBASE_VAPID_KEY}
    container_name: orderium-client
    ports:
      - "3002:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ────────────────────────────────────────────────────────
  # Delivery Portal Frontend
  # ────────────────────────────────────────────────────────
  delivery-portal:
    <<: *frontend-common
    build:
      context: .
      dockerfile: delivery-portal/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
        VITE_MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}
        VITE_FIREBASE_VAPID_KEY: ${VITE_FIREBASE_VAPID_KEY}
    container_name: orderium-delivery
    ports:
      - "3003:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ────────────────────────────────────────────────────────
  # Tenant Management Dashboard
  # ────────────────────────────────────────────────────────
  tenant-dashboard:
    <<: *frontend-common
    build:
      context: ./tenant-dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${TENANT_DASHBOARD_API_URL:-http://localhost:3000}
    container_name: orderium-tenant-dashboard
    ports:
      - "4000:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ────────────────────────────────────────────────────────
# Network — created by docker-compose.infra.yml
# ────────────────────────────────────────────────────────
networks:
  orderium-network:
    external: true
    name: orderium-network
