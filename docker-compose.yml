# ==================================
# Production — Application Stack
# ==================================
# Manages stateless application services only (API + 3 frontends).
# Infrastructure (postgres, redis, minio) lives in docker-compose.infra.yml
# and must be started first.
#
# Usage:
#   1. docker compose -f docker-compose.infra.yml up -d
#   2. docker compose up -d --build
# ==================================

services:

  # ────────────────────────────────────────────────────────
  # NestJS API Backend
  # ────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: orderium-api
    restart: unless-stopped

    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000

      # ── Database (default / legacy) ──────────────────────
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres_user}
      DB_PASSWORD: ${DB_PASSWORD:-postgres_password}
      DB_NAME: ${DB_NAME:-orderium_db}
      DB_SYNCHRONIZE: "false"
      DB_LOGGING: ${DB_LOGGING:-false}

      # ── Multi-tenant master DB ───────────────────────────
      MASTER_DB_NAME: ${MASTER_DB_NAME:-orderium_master}
      SUPER_ADMIN_API_KEY: ${SUPER_ADMIN_API_KEY}

      # ── JWT ──────────────────────────────────────────────
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}

      # ── CORS ─────────────────────────────────────────────
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001,http://localhost:3002,http://localhost:3003}

      # ── Defaults ─────────────────────────────────────────
      DEFAULT_CASH_REGISTER_ID: ${DEFAULT_CASH_REGISTER_ID:-1}
      DEFAULT_WAREHOUSE_ID: ${DEFAULT_WAREHOUSE_ID:-1}
      DEFAULT_DOCUMENT_TYPE_ID: ${DEFAULT_DOCUMENT_TYPE_ID:-2}
      DEFAULT_PAID_STATUS: ${DEFAULT_PAID_STATUS:-2}

      # ── MinIO ────────────────────────────────────────────
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-orderium-media}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}

      # ── Redis ────────────────────────────────────────────
      REDIS_URL: redis://redis:6379

      # ── Firebase ─────────────────────────────────────────
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}

    ports:
      - "3000:3000"

    networks:
      - orderium-network

    # Infra services run in a separate stack; restart handles timing.
    # Frontends wait for the API to be healthy — that's enough.
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})\"" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ────────────────────────────────────────────────────────
  # Backoffice Frontend  (Admin)
  # ────────────────────────────────────────────────────────
  backoffice:
    build:
      context: .
      dockerfile: backoffice/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
        VITE_MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}
        VITE_FIREBASE_VAPID_KEY: ${VITE_FIREBASE_VAPID_KEY}
    container_name: orderium-backoffice
    restart: unless-stopped
    ports:
      - "3001:80"
    networks:
      - orderium-network
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ────────────────────────────────────────────────────────
  # Client Portal Frontend
  # ────────────────────────────────────────────────────────
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
        VITE_MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}
        VITE_FIREBASE_VAPID_KEY: ${VITE_FIREBASE_VAPID_KEY}
    container_name: orderium-client
    restart: unless-stopped
    ports:
      - "3002:80"
    networks:
      - orderium-network
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ────────────────────────────────────────────────────────
  # Delivery Portal Frontend
  # ────────────────────────────────────────────────────────
  delivery-portal:
    build:
      context: .
      dockerfile: delivery-portal/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
        VITE_MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}
        VITE_FIREBASE_VAPID_KEY: ${VITE_FIREBASE_VAPID_KEY}
    container_name: orderium-delivery
    restart: unless-stopped
    ports:
      - "3003:80"
    networks:
      - orderium-network
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ────────────────────────────────────────────────────────
  # Tenant Management Dashboard
  # ────────────────────────────────────────────────────────
  tenant-dashboard:
    build:
      context: ./tenant-dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${TENANT_DASHBOARD_API_URL:-http://localhost:3000}
    container_name: orderium-tenant-dashboard
    restart: unless-stopped
    ports:
      - "4000:80"
    networks:
      - orderium-network
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ────────────────────────────────────────────────────────
# Network — must already exist (created by docker-compose.infra.yml)
# ────────────────────────────────────────────────────────
networks:
  orderium-network:
    external: true
    name: orderium-network
