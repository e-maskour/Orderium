<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f08a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c96510;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="oGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff0db;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#5c3007" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect x="10" y="10" width="180" height="180" rx="40" ry="40" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <!-- Subtle inner glow -->
  <rect x="14" y="14" width="172" height="172" rx="37" ry="37" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- Letter O - outer ring -->
  <path d="M100 52c-26.5 0-48 21.5-48 48s21.5 48 48 48 48-21.5 48-48-21.5-48-48-48zm0 78c-16.6 0-30-13.4-30-30s13.4-30 30-30 30 13.4 30 30-13.4 30-30 30z" fill="url(#oGrad)"/>
  <!-- Decorative accent dot -->
  <circle cx="152" cy="52" r="8" fill="#ffffff" opacity="0.9"/>
  <circle cx="152" cy="52" r="4" fill="#df7817"/>
</svg>
