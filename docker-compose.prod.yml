# ==================================
# Production Docker Compose for Orderium Platform
# ==================================
# Deployed via Dokploy + Traefik on Contabo VPS
# Infrastructure (postgres, redis, minio) runs separately
#
# Usage: Deploy via Dokploy (GitHub source → Compose service)
# Compose Path: docker-compose.prod.yml
# ==================================

services:

  # ==================================
  # NestJS API Backend
  # ==================================
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      # Database
      DB_TYPE: postgres
      DB_HOST: infrastructure-postgres-9ea6vg
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-orderium_master}
      DB_SYNCHRONIZE: "false"
      DB_LOGGING: "false"
      MASTER_DB_NAME: ${MASTER_DB_NAME:-orderium_master}
      # Auth
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      SUPER_ADMIN_API_KEY: ${SUPER_ADMIN_API_KEY}
      # CORS
      CORS_ORIGIN: "https://*.mar-nova.com"
      # Defaults
      DEFAULT_CASH_REGISTER_ID: ${DEFAULT_CASH_REGISTER_ID:-1}
      DEFAULT_WAREHOUSE_ID: ${DEFAULT_WAREHOUSE_ID:-1}
      DEFAULT_DOCUMENT_TYPE_ID: ${DEFAULT_DOCUMENT_TYPE_ID:-2}
      DEFAULT_PAID_STATUS: ${DEFAULT_PAID_STATUS:-2}
      # MinIO
      MINIO_ENDPOINT: infrastructure-minio-cibqzy-minio-1
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-orderium-media}
      MINIO_PUBLIC_URL: https://storage.mar-nova.com
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@infrastructure-redis-o9xfhz:6379
      # Firebase
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # API HTTPS route
      - "traefik.http.routers.orderium-api.rule=Host(`orderium-api.mar-nova.com`)"
      - "traefik.http.routers.orderium-api.entrypoints=websecure"
      - "traefik.http.routers.orderium-api.tls=true"
      - "traefik.http.routers.orderium-api.tls.certresolver=letsencrypt-dns"
      - "traefik.http.services.orderium-api.loadbalancer.server.port=3000"
      # CORS middleware
      - "traefik.http.routers.orderium-api.middlewares=orderium-cors"
      - "traefik.http.middlewares.orderium-cors.headers.accesscontrolallowmethods=GET,POST,PUT,PATCH,DELETE,OPTIONS"
      - "traefik.http.middlewares.orderium-cors.headers.accesscontrolallowheaders=Content-Type,Authorization,X-Tenant-ID"
      - "traefik.http.middlewares.orderium-cors.headers.accesscontrolalloworiginlistregex=^https://[a-z0-9-]+-(admin|app|delivery)\\.mar-nova\\.com$$"
      - "traefik.http.middlewares.orderium-cors.headers.accesscontrolallowcredentials=true"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==================================
  # Backoffice Frontend (Admin Panel)
  # ==================================
  backoffice:
    build:
      context: .
      dockerfile: backoffice/Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: https://orderium-api.mar-nova.com
        VITE_MINIO_PUBLIC_URL: https://storage.mar-nova.com
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}
        VITE_FIREBASE_VAPID_KEY: ${VITE_FIREBASE_VAPID_KEY}
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.orderium-admin.rule=HostRegexp(`^[a-z0-9-]+-admin\\.mar-nova\\.com$$`)"
      - "traefik.http.routers.orderium-admin.entrypoints=websecure"
      - "traefik.http.routers.orderium-admin.tls=true"
      - "traefik.http.routers.orderium-admin.tls.certresolver=letsencrypt-dns"
      - "traefik.http.routers.orderium-admin.tls.domains[0].main=mar-nova.com"
      - "traefik.http.routers.orderium-admin.tls.domains[0].sans=*.mar-nova.com"
      - "traefik.http.services.orderium-admin.loadbalancer.server.port=80"
    depends_on:
      api:
        condition: service_healthy

  # ==================================
  # Client Portal Frontend
  # ==================================
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: https://orderium-api.mar-nova.com
        VITE_MINIO_PUBLIC_URL: https://storage.mar-nova.com
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}
        VITE_FIREBASE_VAPID_KEY: ${VITE_FIREBASE_VAPID_KEY}
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.orderium-client.rule=HostRegexp(`^[a-z0-9-]+-app\\.mar-nova\\.com$$`)"
      - "traefik.http.routers.orderium-client.entrypoints=websecure"
      - "traefik.http.routers.orderium-client.tls=true"
      - "traefik.http.routers.orderium-client.tls.certresolver=letsencrypt-dns"
      - "traefik.http.routers.orderium-client.tls.domains[0].main=mar-nova.com"
      - "traefik.http.routers.orderium-client.tls.domains[0].sans=*.mar-nova.com"
      - "traefik.http.services.orderium-client.loadbalancer.server.port=80"
    depends_on:
      api:
        condition: service_healthy

  # ==================================
  # Delivery Portal Frontend
  # ==================================
  delivery-portal:
    build:
      context: .
      dockerfile: delivery-portal/Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: https://orderium-api.mar-nova.com
        VITE_MINIO_PUBLIC_URL: https://storage.mar-nova.com
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}
        VITE_FIREBASE_VAPID_KEY: ${VITE_FIREBASE_VAPID_KEY}
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.orderium-delivery.rule=HostRegexp(`^[a-z0-9-]+-delivery\\.mar-nova\\.com$$`)"
      - "traefik.http.routers.orderium-delivery.entrypoints=websecure"
      - "traefik.http.routers.orderium-delivery.tls=true"
      - "traefik.http.routers.orderium-delivery.tls.certresolver=letsencrypt-dns"
      - "traefik.http.routers.orderium-delivery.tls.domains[0].main=mar-nova.com"
      - "traefik.http.routers.orderium-delivery.tls.domains[0].sans=*.mar-nova.com"
      - "traefik.http.services.orderium-delivery.loadbalancer.server.port=80"
    depends_on:
      api:
        condition: service_healthy

  # ==================================
  # Tenant Management Dashboard
  # ==================================
  tenant-dashboard:
    build:
      context: ./tenant-dashboard
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: https://orderium-api.mar-nova.com
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.tenant-dashboard.rule=Host(`tenants.mar-nova.com`)"
      - "traefik.http.routers.tenant-dashboard.entrypoints=websecure"
      - "traefik.http.routers.tenant-dashboard.tls=true"
      - "traefik.http.routers.tenant-dashboard.tls.certresolver=letsencrypt-dns"
      - "traefik.http.services.tenant-dashboard.loadbalancer.server.port=80"