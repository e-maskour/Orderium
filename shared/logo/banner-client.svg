<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80">
  <defs>
    <linearGradient id="cltIconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b57a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cltRingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d1fae5;stop-opacity:1" />
    </linearGradient>
    <filter id="cltShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#023d2e" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Logo icon at 60×60, vertically centered in 80px height -->
  <g transform="translate(10, 10)" filter="url(#cltShadow)">
    <rect x="0" y="0" width="60" height="60" rx="14" ry="14" fill="url(#cltIconGrad)"/>
    <rect x="1.5" y="1.5" width="57" height="57" rx="13" ry="13" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
    <!-- Bold M (scaled 0.3 from 200px viewBox) -->
    <path d="M 20.1,45 L 20.1,26.4 L 30,35.4 L 39.9,26.4 L 39.9,45"
          fill="none" stroke="url(#cltRingGrad)" stroke-width="4.8"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Moroccan 5-pointed star -->
    <circle cx="30" cy="16.5" r="4.5" fill="rgba(255,255,255,0.13)"/>
    <polygon points="30,12.6 30.93,15.21 33.72,15.3 31.5,16.98 32.28,19.65 30,18.09 27.72,19.65 28.5,16.98 26.28,15.3 29.07,15.21"
             fill="#ffffff" opacity="0.96"/>
  </g>

  <!-- Wordmark: "Morocom" -->
  <text x="84" y="43" font-family="'Plus Jakarta Sans','Inter','Segoe UI',system-ui,sans-serif" font-size="26" font-weight="800" fill="#0f172a" letter-spacing="-0.5">Morocom</text>
  <!-- Subtitle: "Client Portal" -->
  <text x="85" y="60" font-family="'Plus Jakarta Sans','Inter','Segoe UI',system-ui,sans-serif" font-size="10" font-weight="600" fill="#059669" letter-spacing="2">CLIENT PORTAL</text>
</svg>
