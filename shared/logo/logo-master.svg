<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGradM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mGradM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowM">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect x="10" y="10" width="180" height="180" rx="42" fill="url(#bgGradM)" filter="url(#shadowM)"/>
  <rect x="14" y="14" width="172" height="172" rx="39" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>
  <!-- Bold M -->
  <path d="M 67,150 L 67,88 L 100,118 L 133,88 L 133,150"
        fill="none" stroke="url(#mGradM)" stroke-width="16"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Moroccan 5-pointed star -->
  <circle cx="100" cy="55" r="15" fill="rgba(255,255,255,0.10)"/>
  <polygon points="100,42 103.1,50.7 112.4,51 105,56.6 107.6,65.5 100,60.3 92.4,65.5 95,56.6 87.6,51 96.9,50.7"
